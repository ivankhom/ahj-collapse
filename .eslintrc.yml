extends: airbnb-base
parser: "@babel/eslint-parser"
parserOptions:
  requireConfigFile: false
  babelOptions:
    presets: ["@babel/preset-env"]
env:
  browser: true
  es6: true
rules:
  no-plusplus: off
  no-restricted-syntax: off
  class-methods-use-this: off
  no-param-reassign:
    - error
    - props: false
